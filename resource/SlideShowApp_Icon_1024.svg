<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SlideShowApp icon</title>
<desc>ダーク系ミニマルアイコン。濃紺の角丸正方形に3枚重ねフォトフレームと再生ボタン。</desc>

<defs>
  <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1a2f4e"/>
    <stop offset="100%" stop-color="#152540"/>
  </linearGradient>
  <linearGradient id="f1g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
  </linearGradient>
  <linearGradient id="f2g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
  </linearGradient>
  <linearGradient id="f3g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#cddcf5" stop-opacity="0.88"/>
  </linearGradient>
  <linearGradient id="playg2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#5aaeff"/>
    <stop offset="100%" stop-color="#2f7fd4"/>
  </linearGradient>
</defs>

<!-- 背景 -->
<rect x="60" y="60" width="904" height="904" rx="193" fill="url(#bg2)"/>

<!-- 奥のフレーム -->
<rect x="135" y="173" width="603" height="445" rx="27" fill="url(#f1g)" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>

<!-- 中のフレーム -->
<rect x="196" y="218" width="603" height="445" rx="27" fill="url(#f2g)" stroke="#ffffff" stroke-opacity="0.20" stroke-width="3"/>

<!-- 手前のフレーム -->
<rect x="256" y="263" width="603" height="445" rx="27" fill="url(#f3g)" stroke="#ffffff" stroke-opacity="0.88" stroke-width="3.5"/>

<!-- フレーム内：山シルエット -->
<g opacity="0.15">
  <path d="M256 648 L362 497 L452 572 L558 452 L679 557 L800 489 L859 519 L859 708 L256 708 Z" fill="#1a2f4e"/>
</g>
<!-- 太陽 -->
<circle cx="754" cy="331" r="45" fill="#1a2f4e" opacity="0.12"/>

<!-- 再生ボタン -->
<circle cx="527" cy="806" r="87" fill="url(#playg2)" opacity="0.96"/>
<polygon points="504,768 504,844 574,806" fill="#ffffff"/>

</svg>
